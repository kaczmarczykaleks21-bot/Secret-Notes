<!doctype html>
<html lang="pl">

    <link rel="stylesheet" href="/CSS/app.css" />

    <div class="alertBanner" id="alertBanner">
      <div class="alert-container">
        <div class="alert-iconContainer">&#10004;</div>

        </div>
        <div class="alert-closeContainer"><span class="x">&times;</span></div>
      </div>
    </div>

        <div class="aisideFooter"></div>
      </aside>
      <main>
        <section class="allNotes">
          <div class="allNotes-header">
            <div class="allNotes-header-texts">
              <h2>Wszystkie notatki</h2>
              <h3>0 notatek · posortowane wg daty</h3>
            </div>
            <div><button class="addNewNoteBtns">+ Nowa notatka</button></div>
          </div>
        </section>
        <section class="favNotes"></section>
        <section class="privateNotes"></section>
      </main>
    </div>
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal hidden" id="logoutModal">
        <div class="modal-content">
          <h2>Wylogowanie</h2>
          <p>Czy na pewno chcesz się wylogować?</p>
          <span class="logoutBtnsContainer">
            <button
              class="logoutModalBtns logoutConfirmBtn"
              id="logoutConfirmBtn"
            >
              Tak
            </button>
            <button
              class="logoutModalBtns logoutCancelBtn"
              id="logoutCancelBtn"
            >
              Anuluj
            </button>
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
